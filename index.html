// === App.jsx ===
// App.jsx — Top-level game state, turn loop, and view orchestration.

const CITY_INCOME = { gold: 12, prod: 14 };
const NEUTRAL_PRODUCTION_FALLOFF = 0.5;
const START_GOLD = 60;
const START_PROD = 60;

function makeInitialState(playerId) {
  const world = window.generateWorld();
  const countries = window.WorldData.COUNTRIES;

  const players = {};
  for (const c of countries) {
    players[c.id] = {
      id: c.id,
      gold: START_GOLD,
      prod: START_PROD,
      alive: true,
    };
  }

  // Starting units: 2 inf + 1 tank near first city of each country
  const units = [];
  for (const c of countries) {
    const firstCity = c.cities[0];
    const t = world.tileAt(firstCity.col, firstCity.row);
    // place units on tile and immediate neighbors
    const placed = [];
    const tryPlace = (col, row, type) => {
      const tile = world.tileAt(col, row);
      if (!tile || tile.terrain === 'ocean') return false;
      if (units.some(u => u.col === col && u.row === row)) return false;
      units.push(window.Units.createUnit(type, c.id, col, row));
      placed.push({ col, row });
      return true;
    };
    tryPlace(t.col, t.row, 'infantry');
    // place 2 more on neighbors
    const ns = window.HexMath.neighbors(t.col, t.row);
    let placedCount = 0;
    for (const n of ns) {
      if (placedCount >= 2) break;
      const nt = world.tileAt(n.col, n.row);
      if (nt.terrain === 'ocean') continue;
      const t2 = placedCount === 0 ? 'tank' : 'infantry';
      if (tryPlace(n.col, n.row, t2)) placedCount++;
    }
  }

  return {
    turn: 1,
    year: 1939,
    world,
    players,
    units,
    cities: [...world.cities],
    queues: {}, // key: 'COUNTRY:col,row' -> array of {type, remaining}
    logs: [],
    playerId,
    phase: 'player', // 'player' | 'ai'
  };
}

function App() {
  const [screen, setScreen] = useState('select');
  const [playerId, setPlayerId] = useState(null);
  const [state, setState] = useState(null);
  const [selectedHex, setSelectedHex] = useState(null);
  const [moveMode, setMoveMode] = useState(false);
  const [hoverHex, setHoverHex] = useState(null);
  const [tooltipPos, setTooltipPos] = useState({ x: 0, y: 0 });
  const [aiThinking, setAiThinking] = useState(false);
  const [aiSpeed, setAiSpeed] = useState('normal');
  const [aiCountry, setAiCountry] = useState(null);
  const [viewport, setViewport] = useState({ w: window.innerWidth, h: window.innerHeight });
  const [endgame, setEndgame] = useState(null);
  const [combatFx, setCombatFx] = useState([]); // {id, col, row, popup}
  const _lang = useLang();

  // Speed -> step delay (ms)
  const SPEED_MS = { slow: 700, normal: 320, fast: 110, skip: 0 };
  const stepMs = SPEED_MS[aiSpeed] ?? 320;

  useEffect(() => {
    const onResize = () => setViewport({ w: window.innerWidth, h: window.innerHeight });
    window.addEventListener('resize', onResize);
    const onMove = (e) => setTooltipPos({ x: e.clientX, y: e.clientY });
    window.addEventListener('mousemove', onMove);
    return () => {
      window.removeEventListener('resize', onResize);
      window.removeEventListener('mousemove', onMove);
    };
  }, []);

  const countriesById = useMemo(() => {
    const map = {};
    for (const c of window.WorldData.COUNTRIES) map[c.id] = c;
    return map;
  }, []);

  const startGame = (id) => {
    const s = makeInitialState(id);
    s.logs.push({ turn: 1, kind: 'build', text: t('log_commence', { nation: countriesById[id].name }) });
    setPlayerId(id);
    setState(s);
    setScreen('play');
    setSelectedHex(null);
    setMoveMode(false);
    setEndgame(null);
  };

  // ----- Helpers -----
  const log = (s, turn, text, kind) => {
    s.logs.push({ turn, text, kind });
  };

  const isPassable = (s, unit) => (col, row) => {
    const t = s.world.tileAt(col, row);
    if (!window.Units.canTraverse(window.Units.UNIT_TYPES[unit.type].domain, t.terrain)) return false;
    if (s.units.some(u => u.col === col && u.row === row && u.id !== unit.id)) return false;
    return true;
  };

  // Compute reachable & attackable for a selected player unit
  const reachData = useMemo(() => {
    if (!state) return { reach: new Set(), attack: new Set() };
    const sel = getSelectedUnit(state);
    if (!sel || sel.owner !== state.playerId) return { reach: new Set(), attack: new Set() };
    if (sel.acted) return { reach: new Set(), attack: new Set() };
    const { reachable } = window.HexMath.reachable(sel.col, sel.row, sel.moves, isPassable(state, sel));
    const reach = new Set(reachable.map(r => r.col + ',' + r.row));
    // Attack disabled entirely when a land unit is on water
    const selTile = state.world.tileAt(sel.col, sel.row);
    if (!window.Units.canAttackFrom(sel, selTile)) return { reach, attack: new Set() };
    // Attackable: enemies within attack range (1, or 2 for artillery/bomber)
    const T = window.Units.UNIT_TYPES[sel.type];
    const range = (sel.type === 'artillery' || sel.type === 'bomber') ? 2 : 1;
    const attack = new Set();
    for (const u of state.units) {
      if (u.owner === sel.owner) continue;
      const d = window.HexMath.hexDistance(sel.col, sel.row, u.col, u.row);
      if (d <= range) attack.add(u.col + ',' + u.row);
    }
    // also allow attacking adjacent enemy cities even if no units (capture)
    if (T.domain === 'land') {
      for (const n of window.HexMath.neighbors(sel.col, sel.row)) {
        const t = state.world.tileAt(n.col, n.row);
        if (t.city && t.city.owner !== sel.owner) {
          attack.add(n.col + ',' + n.row);
        }
      }
    }
    return { reach, attack };
  }, [state, selectedHex, moveMode]);

  function getSelectedUnit(s) {
    if (!selectedHex) return null;
    return s.units.find(u => u.col === selectedHex.col && u.row === selectedHex.row && u.owner === s.playerId)
        || s.units.find(u => u.col === selectedHex.col && u.row === selectedHex.row);
  }

  const handleHexClick = (col, row, e) => {
    if (!state) return;
    const tile = state.world.tileAt(col, row);
    const occupant = state.units.find(u => u.col === col && u.row === row);
    const sel = getSelectedUnit(state);

    // If player has a selected friendly unit & in move mode, attempt to move/attack
    if (sel && sel.owner === state.playerId && (moveMode || true)) {
      const keyHex = col + ',' + row;
      // Attack?
      if (reachData.attack.has(keyHex)) {
        doPlayerAttack(sel, col, row);
        return;
      }
      // Move?
      if (reachData.reach.has(keyHex)) {
        doPlayerMove(sel, col, row);
        return;
      }
    }

    // Otherwise, select this hex
    setSelectedHex({ col, row });
    setMoveMode(false);
  };

  function doPlayerMove(unit, col, row) {
    setState(prev => {
      const s = { ...prev, units: prev.units.map(u => ({ ...u })) };
      const u = s.units.find(x => x.id === unit.id);
      // BFS path so we use correct number of moves
      const path = window.HexMath.findPath(u.col, u.row, col, row, isPassable(s, u));
      const stepCount = path ? path.length : window.HexMath.hexDistance(u.col, u.row, col, row);
      u.col = col;
      u.row = row;
      u.moves = Math.max(0, u.moves - stepCount);
      // Capture city?
      const tile = s.world.tileAt(col, row);
      if (tile.city && tile.city.owner !== u.owner && window.Units.UNIT_TYPES[u.type].domain === 'land') {
        const oldOwner = tile.city.owner;
        tile.city.owner = u.owner;
        const cityEntry = s.cities.find(c => c.col === col && c.row === row);
        if (cityEntry) cityEntry.owner = u.owner;
        log(s, s.turn, t('log_capture', { city: tile.city.name, from: countriesById[oldOwner].short }), 'capture');
        // clear queue of old owner
        delete s.queues[oldOwner + ':' + col + ',' + row];
      }
      return s;
    });
    setSelectedHex({ col, row });
    setMoveMode(false);
  }

  function doPlayerAttack(unit, col, row) {
    // Block attack if attacker is on water (land unit at sea)
    const fromTile = state.world.tileAt(unit.col, unit.row);
    if (!window.Units.canAttackFrom(unit, fromTile)) return;
    setState(prev => {
      const s = { ...prev, units: prev.units.map(u => ({ ...u })) };
      const attacker = s.units.find(x => x.id === unit.id);
      const defender = s.units.find(x => x.col === col && x.row === row && x.owner !== attacker.owner);
      const targetTile = s.world.tileAt(col, row);
      const T = window.Units.UNIT_TYPES[attacker.type];
      const range = (attacker.type === 'artillery' || attacker.type === 'bomber') ? 2 : 1;
      const d = window.HexMath.hexDistance(attacker.col, attacker.row, col, row);
      if (d > range) return prev;

      const ranged = (attacker.type === 'artillery' || attacker.type === 'bomber');
      if (defender) {
        const res = window.Units.resolveCombat(attacker, defender, !!targetTile.city);
        defender.hp -= res.defenderHpLoss;
        if (!ranged) attacker.hp -= res.attackerHpLoss;
        const atkC = countriesById[attacker.owner], defC = countriesById[defender.owner];
        log(s, s.turn,
          `⚔ ${atkC.short} ${T.short} ⇒ ${defC.short} ${window.Units.UNIT_TYPES[defender.type].short} (−${res.defenderHpLoss}${!ranged ? ` / −${res.attackerHpLoss}` : ''})`,
          'combat');
        // Remove dead
        if (defender.hp <= 0) {
          s.units = s.units.filter(u => u.id !== defender.id);
          log(s, s.turn, t('log_destroyed', { nation: defC.short, unit: uName(defender.type) }), 'combat');
          // If melee attacker survives, move onto tile
          if (!ranged && attacker.hp > 0 && T.domain === 'land' && targetTile.terrain !== 'ocean' && attacker.moves > 0) {
            attacker.col = col;
            attacker.row = row;
            attacker.moves = Math.max(0, attacker.moves - 1);
            // Capture if city
            if (targetTile.city && targetTile.city.owner !== attacker.owner) {
              const oldOwner = targetTile.city.owner;
              targetTile.city.owner = attacker.owner;
              const cityEntry = s.cities.find(c => c.col === col && c.row === row);
              if (cityEntry) cityEntry.owner = attacker.owner;
              log(s, s.turn, t('log_capture', { city: targetTile.city.name, from: countriesById[oldOwner].short }), 'capture');
              delete s.queues[oldOwner + ':' + col + ',' + row];
            }
          }
        }
        if (attacker.hp <= 0) {
          s.units = s.units.filter(u => u.id !== attacker.id);
          log(s, s.turn, t('log_destroyed', { nation: atkC.short, unit: uName(attacker.type) }), 'combat');
        } else {
          attacker.acted = true;
          attacker.moves = 0;
        }
      } else if (targetTile.city && targetTile.city.owner !== attacker.owner && T.domain === 'land' && d === 1) {
        // Capture undefended adjacent city
        attacker.col = col; attacker.row = row;
        attacker.moves = Math.max(0, attacker.moves - 1);
        const oldOwner = targetTile.city.owner;
        targetTile.city.owner = attacker.owner;
        const cityEntry = s.cities.find(c => c.col === col && c.row === row);
        if (cityEntry) cityEntry.owner = attacker.owner;
        log(s, s.turn, t('log_capture', { city: targetTile.city.name, from: countriesById[oldOwner].short }), 'capture');
        delete s.queues[oldOwner + ':' + col + ',' + row];
      }
      return s;
    });
    setSelectedHex({ col, row });
    setMoveMode(false);
  }

  function disbandUnit(unitId) {
    setState(prev => ({ ...prev, units: prev.units.filter(u => u.id !== unitId) }));
    setSelectedHex(null);
  }

  function queueBuild(s, countryId, city, type) {
    const T = window.Units.UNIT_TYPES[type];
    const p = s.players[countryId];
    if (p.gold < T.cost.gold || p.prod < T.cost.prod) return false;
    p.gold -= T.cost.gold;
    p.prod -= T.cost.prod;
    const key = countryId + ':' + city.col + ',' + city.row;
    if (!s.queues[key]) s.queues[key] = [];
    s.queues[key].push({ type, remaining: T.buildTime });
    log(s, s.turn, t('log_queue', { nation: countriesById[countryId].short, unit: uName(type), city: city.name }), 'build');
    return true;
  }

  function handleBuild(type) {
    if (!selectedHex) return;
    const tile = state.world.tileAt(selectedHex.col, selectedHex.row);
    if (!tile.city || tile.city.owner !== state.playerId) return;
    setState(prev => {
      const s = { ...prev, players: { ...prev.players }, queues: { ...prev.queues } };
      s.players[state.playerId] = { ...s.players[state.playerId] };
      const cityEntry = s.cities.find(c => c.col === tile.col && c.row === tile.row);
      queueBuild(s, state.playerId, cityEntry, type);
      return s;
    });
  }

  // ----- End turn / AI -----

  function startRound(s) {
    // 1) Income from cities
    for (const city of s.cities) {
      if (!city.owner) continue;
      s.players[city.owner].gold += CITY_INCOME.gold;
      s.players[city.owner].prod += CITY_INCOME.prod;
    }
    // 2) Advance build queues
    for (const key of Object.keys(s.queues)) {
      const q = s.queues[key];
      if (!q || q.length === 0) continue;
      const [countryId, coord] = key.split(':');
      const [col, row] = coord.split(',').map(Number);
      const city = s.cities.find(c => c.col === col && c.row === row);
      // If city no longer owned by countryId, drop queue
      if (!city || city.owner !== countryId) { delete s.queues[key]; continue; }
      // Advance front
      q[0].remaining -= 1;
      if (q[0].remaining <= 0) {
        // Spawn unit
        const type = q.shift().type;
        // pick a spawn hex: city tile if empty, else neighbor
        const tile = s.world.tileAt(col, row);
        const blocked = s.units.some(u => u.col === col && u.row === row);
        let spawn = { col, row };
        if (blocked) {
          for (const n of window.HexMath.neighbors(col, row)) {
            const nt = s.world.tileAt(n.col, n.row);
            const T = window.Units.UNIT_TYPES[type];
            if (!window.Units.canTraverse(T.domain, nt.terrain)) continue;
            if (s.units.some(u => u.col === n.col && u.row === n.row)) continue;
            spawn = n; break;
          }
        }
        const newUnit = window.Units.createUnit(type, countryId, spawn.col, spawn.row);
        s.units.push(newUnit);
        log(s, s.turn, t('log_field', { nation: countriesById[countryId].short, unit: uName(type), city: city.name }), 'build');
      }
    }
    // 3) Reset moves for all units
    for (const u of s.units) {
      u.moves = u.maxMoves;
      u.acted = false;
    }
    // 4) HP regen for units in friendly cities
    for (const u of s.units) {
      const tile = s.world.tileAt(u.col, u.row);
      if (tile.city && tile.city.owner === u.owner) {
        u.hp = Math.min(100, u.hp + 25);
      } else {
        u.hp = Math.min(100, u.hp + 5);
      }
    }
    // 5) Update alive status
    for (const id of Object.keys(s.players)) {
      const hasCities = s.cities.some(c => c.owner === id);
      s.players[id].alive = hasCities;
    }
  }

  function checkEndgame(s) {
    const playerAlive = s.players[s.playerId].alive;
    if (!playerAlive) return 'defeat';
    // win = controlling all enemy capitals (city #0 of every country)
    const capitals = window.WorldData.COUNTRIES.map(c => c.cities[0]);
    const ownsAllCapitals = capitals.every(cap => {
      const cityEntry = s.cities.find(c => c.name === cap.name);
      return cityEntry && cityEntry.owner === s.playerId;
    });
    if (ownsAllCapitals) return 'victory';
    return null;
  }

  function pushFx(kind, col, row, extra) {
    const id = 'fx' + Math.random().toString(36).slice(2);
    setCombatFx(arr => [...arr, { id, kind, col, row, ...extra }]);
    setTimeout(() => setCombatFx(arr => arr.filter(x => x.id !== id)), 1300);
  }

  // Keep a ref to current state so async loops can read latest after a flush.
  const stateRef = useRef(null);
  useEffect(() => { stateRef.current = state; }, [state]);

  function endTurn() {
    if (aiThinking) return;
    setAiThinking(true);
    setSelectedHex(null);
    setMoveMode(false);

    const delay = (ms) => new Promise(r => setTimeout(r, ms));

    (async () => {
      const order = window.WorldData.COUNTRIES.map(c => c.id).filter(id => id !== state.playerId);
      for (const cid of order) {
        const cur = stateRef.current;
        if (!cur || !cur.players[cid] || !cur.players[cid].alive) continue;
        if (aiSpeed !== 'skip') {
          setAiCountry(cid);
          await delay(stepMs * 0.5);
        }
        await runAICountryAnimated(cid, stepMs);
      }
      setAiCountry(null);
      // Advance round
      setState(prev => {
        const s = { ...prev };
        s.turn = prev.turn + 1;
        s.year = 1939 + Math.floor((s.turn - 1) / 4);
        startRound(s);
        return { ...s, units: [...s.units], cities: [...s.cities], queues: { ...s.queues }, players: { ...s.players }, logs: [...s.logs] };
      });
      setAiThinking(false);
    })();
  }

  async function runAICountryAnimated(country, stepDelay) {
    // Snapshot list of unit ids to act for this country at start
    const initialUnits = stateRef.current.units.filter(u => u.owner === country)
      .sort((a, b) => {
        const order = { tank: 0, infantry: 1, artillery: 2, fighter: 3, bomber: 4, destroyer: 5, battleship: 6, submarine: 7 };
        return (order[a.type] || 9) - (order[b.type] || 9);
      })
      .map(u => u.id);

    const wait = (ms) => new Promise(r => setTimeout(r, ms));

    for (const uid of initialUnits) {
      // Each iteration: read fresh state
      let steps = 0;
      while (steps++ < 8) {
        const cur = stateRef.current;
        const live = cur.units.find(u => u.id === uid);
        if (!live || live.acted || live.moves <= 0) break;
        const action = planAIAction(cur, live, country);
        if (!action) break;
        if (action.type === 'attack') {
          applyAttack(action.attackerId, action.defenderId, action.col, action.row);
          pushFx('combat', action.col, action.row);
          if (stepDelay > 0) await wait(stepDelay);
          break;
        } else if (action.type === 'moveStep') {
          applyMoveStep(action.unitId, action.col, action.row);
          if (stepDelay > 0) await wait(stepDelay * 0.55);
        } else break;
      }
    }

    // Build orders
    setState(prev => {
      const s = { ...prev, queues: { ...prev.queues }, players: { ...prev.players }, logs: [...prev.logs] };
      s.players[country] = { ...s.players[country] };
      const myCities = s.cities.filter(c => c.owner === country);
      for (const c of myCities) {
        const key = country + ':' + c.col + ',' + c.row;
        if (s.queues[key] && s.queues[key].length) continue;
        const pick = pickAIBuild(s, country);
        if (pick) queueBuild(s, country, c, pick);
      }
      return s;
    });
    if (stepDelay > 0) await wait(stepDelay * 0.4);
  }

  function pickAIBuild(s, country) {
    const owned = s.units.filter(u => u.owner === country);
    const counts = {};
    for (const u of owned) counts[u.type] = (counts[u.type] || 0) + 1;
    const totalLand = (counts.infantry || 0) + (counts.tank || 0) + (counts.artillery || 0);
    const totalAir = (counts.fighter || 0) + (counts.bomber || 0);
    const preferences = [];
    if (totalLand < 3) preferences.push('infantry', 'infantry', 'tank');
    else if ((counts.infantry || 0) < (counts.tank || 0) * 2) preferences.push('infantry');
    else if ((counts.tank || 0) < 3) preferences.push('tank', 'artillery');
    else if (totalAir < 2) preferences.push('fighter', 'bomber');
    else preferences.push('tank', 'infantry', 'artillery', 'fighter');
    if (Math.random() < 0.18) preferences.unshift('destroyer');
    for (const ty of preferences) {
      const T = window.Units.UNIT_TYPES[ty];
      const p = s.players[country];
      if (p.gold >= T.cost.gold && p.prod >= T.cost.prod) return ty;
    }
    return null;
  }

  function planAIAction(s, unit, country) {
    if (unit.acted || unit.moves <= 0) return null;
    const myTile = s.world.tileAt(unit.col, unit.row);
    const atSea = !window.Units.canAttackFrom(unit, myTile);
    // 1) Attack adjacent — only if not at sea
    if (!atSea) {
      const adj = window.HexMath.neighbors(unit.col, unit.row);
      for (const n of adj) {
        const target = s.units.find(u => u.col === n.col && u.row === n.row && u.owner !== country);
        if (target) {
          const tt = s.world.tileAt(n.col, n.row);
          // Sea units can only "attack" ocean tiles; land units can attack land tiles
          if (window.Units.UNIT_TYPES[unit.type].domain === 'sea' && tt.terrain !== 'ocean') continue;
          if (window.Units.UNIT_TYPES[unit.type].domain === 'land' && tt.terrain === 'ocean') continue;
          return { type: 'attack', attackerId: unit.id, defenderId: target.id, col: n.col, row: n.row };
        }
      }
    }
    // 2) Step toward target
    const findCity = () => {
      let best = null, bestD = Infinity;
      for (const c of s.cities) {
        if (c.owner === country) continue;
        const d = window.HexMath.hexDistance(unit.col, unit.row, c.col, c.row);
        if (d < bestD) { bestD = d; best = c; }
      }
      return best;
    };
    const findEnemy = () => {
      let best = null, bestD = Infinity;
      for (const u of s.units) {
        if (u.owner === country) continue;
        const d = window.HexMath.hexDistance(unit.col, unit.row, u.col, u.row);
        if (d < bestD) { bestD = d; best = u; }
      }
      return best;
    };
    const city = findCity();
    const enemy = findEnemy();
    let target = city;
    if (enemy && city) {
      const dC = window.HexMath.hexDistance(unit.col, unit.row, city.col, city.row);
      const dU = window.HexMath.hexDistance(unit.col, unit.row, enemy.col, enemy.row);
      if (dU < dC - 1) target = enemy;
    } else if (enemy) target = enemy;
    if (!target) return null;
    const isPass = (col, row) => {
      const tt = s.world.tileAt(col, row);
      if (!window.Units.canTraverse(window.Units.UNIT_TYPES[unit.type].domain, tt.terrain)) return false;
      if (s.units.some(u => u.col === col && u.row === row && u.id !== unit.id)) return false;
      return true;
    };
    const path = window.HexMath.findPath(unit.col, unit.row, target.col, target.row, isPass);
    if (!path || !path.length) return null;
    const next = path[0];
    if (!isPass(next.col, next.row)) {
      // try to attack if next is target with enemy
      const en = s.units.find(u => u.col === next.col && u.row === next.row && u.owner !== country);
      if (en) return { type: 'attack', attackerId: unit.id, defenderId: en.id, col: next.col, row: next.row };
      return null;
    }
    return { type: 'moveStep', unitId: unit.id, col: next.col, row: next.row };
  }

  function applyMoveStep(unitId, col, row) {
    setState(prev => {
      const s = { ...prev, units: prev.units.map(u => ({ ...u })), cities: [...prev.cities], queues: { ...prev.queues }, logs: [...prev.logs] };
      const u = s.units.find(x => x.id === unitId);
      if (!u) return prev;
      u.col = col; u.row = row;
      u.moves = Math.max(0, u.moves - 1);
      const tile = s.world.tileAt(col, row);
      if (tile.city && tile.city.owner !== u.owner && window.Units.UNIT_TYPES[u.type].domain === 'land') {
        const oldOwner = tile.city.owner;
        tile.city.owner = u.owner;
        const cityEntry = s.cities.find(c => c.col === col && c.row === row);
        if (cityEntry) cityEntry.owner = u.owner;
        s.logs.push({ turn: s.turn, kind: 'capture', text: t('log_capture', { city: tile.city.name, from: countriesById[oldOwner].short }) });
        delete s.queues[oldOwner + ':' + col + ',' + row];
        pushFx('capture', col, row);
      }
      return s;
    });
  }

  function applyAttack(attackerId, defenderId, col, row) {
    setState(prev => {
      const s = { ...prev, units: prev.units.map(u => ({ ...u })), cities: [...prev.cities], queues: { ...prev.queues }, logs: [...prev.logs] };
      const attacker = s.units.find(x => x.id === attackerId);
      const defender = s.units.find(x => x.id === defenderId);
      if (!attacker || !defender) return prev;
      const tile = s.world.tileAt(col, row);
      const ranged = (attacker.type === 'artillery' || attacker.type === 'bomber');
      const res = window.Units.resolveCombat(attacker, defender, !!tile.city);
      defender.hp -= res.defenderHpLoss;
      if (!ranged) attacker.hp -= res.attackerHpLoss;
      const atkC = countriesById[attacker.owner], defC = countriesById[defender.owner];
      const atkU = window.Units.UNIT_TYPES[attacker.type], defU = window.Units.UNIT_TYPES[defender.type];
      s.logs.push({ turn: s.turn, kind: 'combat',
        text: `⚔ ${atkC.short} ${atkU.short} → ${defC.short} ${defU.short} (−${res.defenderHpLoss}${!ranged ? ` / −${res.attackerHpLoss}` : ''})` });
      if (defender.hp <= 0) {
        s.units = s.units.filter(u => u.id !== defender.id);
        s.logs.push({ turn: s.turn, kind: 'combat', text: t('log_destroyed', { nation: defC.short, unit: uName(defender.type) }) });
        if (!ranged && attacker.hp > 0 && atkU.domain === 'land' && tile.terrain !== 'ocean') {
          attacker.col = col; attacker.row = row;
          attacker.moves = Math.max(0, attacker.moves - 1);
          if (tile.city && tile.city.owner !== attacker.owner) {
            const oldOwner = tile.city.owner;
            tile.city.owner = attacker.owner;
            const cityEntry = s.cities.find(c => c.col === col && c.row === row);
            if (cityEntry) cityEntry.owner = attacker.owner;
            s.logs.push({ turn: s.turn, kind: 'capture', text: t('log_capture', { city: tile.city.name, from: countriesById[oldOwner].short }) });
            delete s.queues[oldOwner + ':' + col + ',' + row];
          }
        }
      }
      if (attacker.hp <= 0) {
        s.units = s.units.filter(u => u.id !== attacker.id);
        s.logs.push({ turn: s.turn, kind: 'combat', text: t('log_destroyed', { nation: atkC.short, unit: uName(attacker.type) }) });
      } else {
        attacker.acted = true;
        attacker.moves = 0;
      }
      return s;
    });
  }

  // Check endgame whenever state changes
  useEffect(() => {
    if (!state) return;
    const e = checkEndgame(state);
    if (e && !endgame) setEndgame(e);
  }, [state]);

  // ----- Render -----
  if (screen === 'select') {
    return <window.CountrySelect countries={window.WorldData.COUNTRIES} onPick={startGame} />;
  }
  if (!state) return null;

  const sel = getSelectedUnit(state);
  const selTile = selectedHex ? state.world.tileAt(selectedHex.col, selectedHex.row) : null;
  const player = state.players[state.playerId];
  const playerCountry = countriesById[state.playerId];

  const hoverTile = hoverHex ? state.world.tileAt(hoverHex.col, hoverHex.row) : null;
  const hoverUnits = hoverHex ? state.units.filter(u => u.col === hoverHex.col && u.row === hoverHex.row) : [];

  const playerCityCount = state.cities.filter(c => c.owner === state.playerId).length;
  const playerUnitCount = state.units.filter(u => u.owner === state.playerId).length;

  return (
    <>
      <window.TopBar
        turn={state.turn}
        year={state.year}
        playerCountry={playerCountry}
        gold={player.gold}
        prod={player.prod}
        cities={playerCityCount}
        units={playerUnitCount}
        onEndTurn={endTurn}
        aiThinking={aiThinking}
        aiSpeed={aiSpeed}
        setAiSpeed={setAiSpeed}
      />
      <div className="layout">
        <div className="map-wrap">
          <div className={`turn-banner ${aiThinking ? 'ai' : ''}`}>
            <span className="dot" />
            {aiThinking
              ? (aiCountry ? `${countriesById[aiCountry].short} — ${t('banner_ai')}` : t('banner_ai'))
              : `${playerCountry.short} ${t('banner_orders')}`}
          </div>
          <window.HexMap
            state={state}
            selectedUnitId={sel?.id}
            hoverHex={hoverHex}
            onHexClick={handleHexClick}
            onHexHover={setHoverHex}
            reachableSet={new Set([...reachData.reach, ...reachData.attack])}
            countriesById={countriesById}
            viewport={viewport}
          />
          {hoverTile && (
            <window.HexTooltip
              x={tooltipPos.x}
              y={tooltipPos.y}
              tile={hoverTile}
              country={hoverTile.owner ? countriesById[hoverTile.owner] : null}
              units={hoverUnits}
              countriesById={countriesById}
            />
          )}
          <window.MiniMap state={state} countriesById={countriesById} playerCountry={playerCountry} />
        </div>
        <div className="sidebar">
          {sel ? (
            <window.UnitPanel
              unit={sel}
              country={countriesById[sel.owner]}
              onMoveMode={() => setMoveMode(m => !m)}
              onDisband={() => disbandUnit(sel.id)}
              moveMode={moveMode}
              isPlayerUnit={sel.owner === state.playerId}
              atSea={window.Units.isAtSea(sel, state.world.tileAt(sel.col, sel.row))}
            />
          ) : selTile && selTile.city ? null : (
            <div className="panel-section empty">
              <h3>{t('command_console')}</h3>
              <p>{t('console_hint')}</p>
            </div>
          )}
          {selTile && selTile.city && (
            <window.CityPanel
              city={selTile.city}
              country={countriesById[selTile.city.owner]}
              queue={state.queues[selTile.city.owner + ':' + selTile.col + ',' + selTile.row]}
              players={state.players}
              onBuild={handleBuild}
              isPlayerCity={selTile.city.owner === state.playerId}
            />
          )}
          {selTile && !sel && (
            <window.HexInfoPanel
              tile={selTile}
              country={selTile.owner ? countriesById[selTile.owner] : null}
              units={state.units.filter(u => u.col === selTile.col && u.row === selTile.row)}
              countriesById={countriesById}
            />
          )}
          <window.LogPanel logs={state.logs} />
        </div>
      </div>
      {endgame && (
        <div className="endgame">
          <div className={`card ${endgame}`}>
            <h2>{endgame === 'victory' ? t('victory') : t('defeat')}</h2>
            <p>{endgame === 'victory' ? t('victory_sub') : t('defeat_sub')}</p>
            <button onClick={() => { setScreen('select'); setState(null); setEndgame(null); }}>{t('new_campaign')}</button>
          </div>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
</body>
</html>
